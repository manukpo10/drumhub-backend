# Dev-only JWT secret — never use in production.
app:
  jwt:
    secret: dev-only-secret-not-for-production-use-32ch
  mp:
    access-token: TEST-dev-access-token
    webhook-secret: dev-webhook-secret-for-local-testing
    public-key: TEST-dev-public-key
  pricing:
    fallback-mep: 1000

spring:
  datasource:
    url: jdbc:h2:mem:drumhub;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    # H2Dialect is auto-detected; no need to specify it explicitly (avoids Hibernate deprecation warning)
    show-sql: true
    hibernate:
      # "none" lets Flyway own schema; no entities exist yet so "validate" would fail.
      # Switch to "validate" once the first migration + entity land (step 1).
      ddl-auto: none
  flyway:
    enabled: true
