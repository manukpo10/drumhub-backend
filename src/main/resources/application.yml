spring:
  application:
    name: drumhub-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      # Profile-specific configs override this. Prod uses "validate"; dev uses "none".
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  cors:
    # Comma-separated. In prod set APP_CORS_ALLOWED_ORIGINS to the deployed frontend URL.
    # No default: app will fail to start in prod if the env var is missing (intentional).
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    # No default: app will refuse to start if JWT_SECRET is not set in the environment.
    # Generate with: openssl rand -base64 48
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  mp:
    access-token: ${MP_ACCESS_TOKEN}
    webhook-secret: ${MP_WEBHOOK_SECRET}
    public-key: ${MP_PUBLIC_KEY}
  pricing:
    # Fallback MEP rate used when dolarapi.com is unreachable and no cached rate exists.
    # Override in production via MP_FALLBACK_MEP env var. Default: 1400 ARS/USD.
    fallback-mep: ${MP_FALLBACK_MEP:1400}
  supabase:
    url: ${SUPABASE_URL:https://yznaanpjkiivrujjnrjf.supabase.co}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}

google:
  client-id: ${GOOGLE_CLIENT_ID:431278406816-9iq60ns1ro7pmbo6ji2j0j849n93avcs.apps.googleusercontent.com}
