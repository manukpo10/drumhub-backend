spring:
  application:
    name: drumhub-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      # Profile-specific configs override this. Prod uses "validate"; dev uses "none".
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  cors:
    # Comma-separated. In prod set APP_CORS_ALLOWED_ORIGINS to the deployed frontend URL,
    # e.g. https://drumhub.vercel.app
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:drumhub-dev-secret-key-must-be-at-least-32-chars-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
