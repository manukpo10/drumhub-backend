# Production profile — uses PostgreSQL (e.g. Supabase). PostgreSQL driver is in pom.xml.
#
# Required environment variables:
#   DB_URL      — JDBC URL. For Supabase + Render (IPv4) use the SESSION pooler on port 5432:
#                 jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
#   DB_USER     — Supabase pooler user: postgres.<project-ref>
#   DB_PASSWORD — your database password
#   APP_CORS_ALLOWED_ORIGINS — the deployed frontend origin(s), comma-separated
#   JWT_SECRET  — a long random secret (>=32 chars); generate with: openssl rand -base64 48
#   MP_ACCESS_TOKEN — Mercado Pago production access token
#   MP_WEBHOOK_SECRET — Mercado Pago webhook secret for HMAC validation
#   MP_PUBLIC_KEY — Mercado Pago public key (safe to expose in frontend)
#
# NOTE: use the SESSION pooler (5432), NOT the transaction pooler (6543) — Flyway's advisory
# locks and Hibernate prepared statements need session-level features pgBouncer txn mode lacks.

# Disable API docs exposure in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Flyway fully owns the schema. "none" (not "validate") avoids a startup failure from
      # Hibernate mapping Instant -> timestamptz while the migrations create plain TIMESTAMP.
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
